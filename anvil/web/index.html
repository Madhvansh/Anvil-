<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <script>
      // Self-heal: an earlier build shipped a precaching PWA service worker that could pin the
      // browser to an old app shell after the broker OAuth redirect. Drop any leftover caches and
      // unregister any leftover worker so the live app is always loaded fresh from the server. If a
      // stale worker actually existed, reload ONCE (guarded by sessionStorage so it can never loop)
      // so the user lands on the current app immediately instead of on the next navigation.
      (function () {
        try {
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function (rs) {
                if (!rs.length) return;
                Promise.all(rs.map(function (r) { return r.unregister(); })).then(function () {
                  if (!sessionStorage.getItem("anvil_sw_healed")) {
                    sessionStorage.setItem("anvil_sw_healed", "1");
                    window.location.reload();
                  }
                });
              })
              .catch(function () {});
          }
        } catch (e) {}
      })();
    </script>
    <title>Anvil — Options Intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
